<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evaluación en curso</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />

    <script>
      /* Capturamos la materia una sola vez para todo el documento */
      const urlParams = new URLSearchParams(window.location.search);
      const materiaSeleccionada = urlParams.get("materia") || "frontend";

      // Carga dinámica de estilo
      const styleLink = document.createElement("link");
      styleLink.rel = "stylesheet";
      styleLink.href = `${materiaSeleccionada}/css/style.css`;
      document.head.appendChild(styleLink);
    </script>

    <style>
      #quiz-engine {
        min-height: 400px;
      }
      .sticky-top-bar {
        top: 0;
        background-color: var(--bg-surface);
        z-index: 1020;
        border-bottom: 2px solid var(--text-main);
      }
    </style>
  </head>
  <body class="bg-grid">
    <nav class="sticky-top-bar shadow-sm py-2 mb-4">
      <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-3">
          <script>
            /* Corrección del ruteo para el botón volver */
            document.write(
              `<a href="${materiaSeleccionada}/index.html" class="btn btn-outline-tech">VOLVER</a>`,
            );
          </script>
          <span id="exam-title" class="fw-bold text-uppercase text-dark"
            >Iniciando...</span
          >
        </div>
      </div>
    </nav>

    <div class="container">
      <!-- RESULTADOS -->
      <div
        id="resultado-final"
        class="custom-card animate__animated animate__zoomIn d-none"
      >
        <div class="custom-card-header bg-dark text-white">
          <span>Resultado</span>
        </div>
        <div class="card-body text-center p-5">
          <p class="small text-muted mb-1 text-uppercase">Puntaje</p>
          <h2 class="display-1 fw-bold mb-3" id="puntaje-score">0 / 0</h2>
          <p
            id="msg-final"
            class="h5 text-uppercase mb-5 py-2 px-3 d-inline-block alert-success-tech"
          ></p>
          <div class="row justify-content-center">
            <div class="col-md-5 d-grid gap-2">
              <button onclick="location.reload()" class="btn btn-tech">
                REINTENTAR
              </button>
              <script>
                document.write(
                  `<a href="${materiaSeleccionada}/index.html" class="btn btn-outline-tech">IR AL MENÚ</a>`,
                );
              </script>
            </div>
          </div>
        </div>
      </div>

      <main id="quiz-engine" class="row">
        <div class="col-12 text-center py-5">
          <p class="font-monospace text-muted">
            Sincronizando banco de datos...
          </p>
        </div>
      </main>

      <div class="mb-5 pb-5 mt-4 text-center">
        <button id="btn-finalizar" class="btn btn-tech btn-lg px-5 shadow">
          ENTREGAR EXAMEN
        </button>
      </div>
    </div>

    <!-- Script Centralizado -->
    <script type="module" src="common/js/engine.js"></script>
  </body>
</html>
