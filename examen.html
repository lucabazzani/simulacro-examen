<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulacro exámen</title>
    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Animate.css -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <!-- Estilo personalizado -->
    <link rel="stylesheet" href="css/style.css" />

    <style>
      /* Reglas críticas de renderizado para evitar saltos visuales */
      #quiz-engine {
        min-height: 400px;
      }

      .sticky-top-bar {
        top: 0;
        background-color: var(--bg-surface);
        z-index: 1020;
        border-bottom: 2px solid var(--text-main);
        /* Quitamos padding manual para que Bootstrap controle el container interno */
      }

      /* Clases de estado (usadas por engine.js al finalizar) */
      .border-success-tech {
        border-color: var(--primary-green) !important;
        box-shadow: 0 0 20px rgba(208, 255, 65, 0.4) !important;
      }
      .border-danger-tech {
        border-color: #ff5f5f !important;
        box-shadow: 0 0 20px rgba(255, 95, 95, 0.4) !important;
      }
    </style>
  </head>
  <body class="bg-grid">
    <!-- BARRA DE ESTADO SUPERIOR -->
    <nav class="sticky-top-bar shadow-sm py-2 mb-4">
      <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-3">
          <a href="index.html" class="btn btn-outline-tech">VOLVER</a>
          <span
            id="exam-title"
            class="fw-bold text-uppercase text-dark tracking-tighter"
            >Cargando...</span
          >
        </div>
      </div>
    </nav>

    <div class="container">
      <!-- PANEL DE RESULTADOS -->
      <div
        id="resultado-final"
        class="custom-card animate__animated animate__zoomIn d-none border-success-tech"
      >
        <div class="custom-card-header bg-dark text-white">
          <span>Resumen</span>
          <div class="window-controls">
            <div class="win-btn text-black" onclick="location.reload()">×</div>
          </div>
        </div>
        <div class="card-body text-center p-5">
          <p class="small text-muted mb-1 text-uppercase">Nota Final</p>
          <h2 class="display-1 fw-bold mb-3" id="puntaje-score">0 / 0</h2>
          <p
            id="msg-final"
            class="h4 text-uppercase mb-5 py-2 px-3 d-inline-block alert-success-tech"
          ></p>

          <div class="row justify-content-center">
            <div class="col-md-5 d-grid gap-2">
              <button onclick="location.reload()" class="btn btn-tech">
                REINTENTAR
              </button>
              <a href="index.html" class="btn btn-outline-tech">INICIO</a>
            </div>
          </div>
        </div>
      </div>

      <!-- CONTENEDOR DE PREGUNTAS (DONDE ACTÚA EL ENGINE.JS) -->
      <main id="quiz-engine" class="row">
        <div class="col-12 text-center py-5">
          <div class="spinner-border text-dark" role="status">
            <span class="visually-hidden">Procesando...</span>
          </div>
          <p class="mt-3 font-monospace fw-bold text-uppercase">Cargando...</p>
        </div>
      </main>

      <!-- BOTÓN DE ENTREGA -->
      <div class="mb-5 pb-5 mt-4 text-center">
        <button id="btn-finalizar" class="btn btn-tech btn-lg px-5 shadow">
          ENTREGAR
        </button>
      </div>
    </div>

    <!-- CARGA DE LÓGICA -->
    <script type="module" src="js/engine.js"></script>
  </body>
</html>
